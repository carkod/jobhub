  db:
    image: mongo:7.0
    container_name: jobhub_db
    restart: always
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_AUTH_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_AUTH_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet --host localhost --username \"$$MONGO_INITDB_ROOT_USERNAME\" --password \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    expose:
      - "27017"
    networks:
      - db_net
    volumes:
      - ./mongo_db:/data/db

volumes:
  mongo_db:

networks:
  app_net:
  db_net:
    internal: true
